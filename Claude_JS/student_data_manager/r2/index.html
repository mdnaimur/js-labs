<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student and Product Mangement Practice </title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h2> Student Data Manage Revision</h2>
    <div class="stats" id="stats"></div>
    <div class="controls">
        <input oninput="render()" type="text" id="searchInput" placeholder="Search By Name" />
        <select name="" id="filterGrade" onchange="render()">
            <option value="">All grades</option>
            <option value="A">Grade A</option>
            <option value="B">Grade B</option>
            <option value="C">Grade C</option>
            <option value="F">Grade F</option>

        </select>

        <select name="" id="sortBy" onchange="render()">
            <option value="name">Sort by Name</option>
            <option value="grade">Sort by Grade</option>
            <option value="score">Sort by Score</option>
        </select>
        <button class="btn-primary" onclick="toggleForm()"> + Add Student</button>
    </div>
    <div id="addForm">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="newName" placeholder=" Full Name">
            </div>

            <div class="form-group">
                <label>Score (1 - 100) </label>
                <input type="number" id="newScore" placeholder=" Score" min="0" max="100">
            </div>

            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="newSubject" placeholder="Subject" />
            </div>
            <button class="btn-primary" onclick="addStudent()">Add</button>
        </div>
    </div>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Subject</th>
                <th>Score</th>
                <th>Grade</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>


    <br> <br> <br>

    <section>
        <h2> Student Merge</h2>
        <button id="mergeBtn">Merge Students</button>
        <button id="jsonBtn">Convert to JSON</button>

        <div class="output">
            <h2>Merged Students</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="tableBody2"></tbody>
            </table>

            <div class="json-output">
                <h2>JSON Output</h2>
                <pre id="jsonBox"></pre>
            </div>
        </div>
    </section>

    <section>

        <div id="analytics"></div>
        <button onclick="renderAnalytics()">Show Analytics</button>
        <a href="./dashboard.html">
            <button>Go Dashborad</button>
        </a>
    </section>

    <script src="./index.js"></script>
</body>

</html>
