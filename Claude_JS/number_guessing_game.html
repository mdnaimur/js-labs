<style>
  #game {
    padding: 1.5rem 0;
    max-width: 480px;
  }

  #feedback {
    min-height: 28px;
    font-size: 15px;
    font-weight: 500;
    margin: 1rem 0 0.5rem;
  }

  #history {
    margin-top: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .guess-pill {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-secondary);
  }

  .guess-pill.high {
    background: #faece7;
    color: #993c1d;
    border-color: #f0997b;
  }

  .guess-pill.low {
    background: #e6f1fb;
    color: #185fa5;
    border-color: #85b7eb;
  }

  .guess-pill.win {
    background: #eaf3de;
    color: #3b6d11;
    border-color: #97c459;
  }

  #attempts-bar {
    display: flex;
    gap: 6px;
    margin: 0.75rem 0;
  }

  .attempt-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--color-border-tertiary);
    transition: background 0.3s;
  }

  .attempt-dot.used {
    background: #7f77dd;
  }

  .attempt-dot.last {
    background: #e24b4a;
  }

  #guess-input {
    width: 100px;
    margin-right: 8px;
  }

  #range-hint {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin: 0.5rem 0 1rem;
  }

  #result-banner {
    display: none;
    padding: 1rem 1.25rem;
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    margin-top: 1rem;
    font-size: 14px;
  }
</style>

<div id="game">
  <h2 style="font-size: 18px; font-weight: 500; margin: 0 0 4px">
    Number guessing game
  </h2>
  <p id="range-hint">
    Guess a number between <strong id="lo">1</strong> and
    <strong id="hi">100</strong>
  </p>

  <div id="attempts-bar"></div>

  <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap">
    <input
      type="number"
      id="guess-input"
      min="1"
      max="100"
      placeholder="Your guess"
    />
    <button onclick="makeGuess()">Guess</button>
    <button onclick="resetGame()" style="color: var(--color-text-secondary)">
      New game
    </button>
  </div>

  <div id="feedback"></div>
  <div id="history"></div>

  <div id="result-banner">
    <span id="result-text"></span>
    <button
      onclick="
        sendPrompt(
          'Explain how the number guessing game code works step by step',
        )
      "
      style="margin-left: 12px; font-size: 13px"
    >
      Explain the code ↗
    </button>
  </div>
</div>

<script>
  const MAX_ATTEMPTS = 7;
  let secret, attempts, guesses, gameOver;

  function resetGame() {
    secret = Math.floor(Math.random() * 100) + 1;
    attempts = 0;
    guesses = [];
    gameOver = false;

    document.getElementById("feedback").textContent = "";
    document.getElementById("history").innerHTML = "";
    document.getElementById("result-banner").style.display = "none";
    document.getElementById("guess-input").value = "";
    document.getElementById("guess-input").disabled = false;
    document.getElementById("lo").textContent = "1";
    document.getElementById("hi").textContent = "100";

    const bar = document.getElementById("attempts-bar");
    bar.innerHTML = "";
    for (let i = 0; i < MAX_ATTEMPTS; i++) {
      const dot = document.createElement("div");
      dot.className = "attempt-dot";
      dot.id = "dot-" + i;
      bar.appendChild(dot);
    }
  }

  function makeGuess() {
    if (gameOver) return;

    const input = document.getElementById("guess-input");
    const guess = parseInt(input.value);

    if (isNaN(guess) || guess < 1 || guess > 100) {
      document.getElementById("feedback").textContent =
        "Please enter a number between 1 and 100.";
      document.getElementById("feedback").style.color =
        "var(--color-text-danger)";
      return;
    }

    attempts++;
    guesses.push(guess);

    const dot = document.getElementById("dot-" + (attempts - 1));
    if (dot) dot.classList.add(attempts === MAX_ATTEMPTS ? "last" : "used");

    const pill = document.createElement("span");
    pill.className = "guess-pill";

    const fb = document.getElementById("feedback");
    const lo = document.getElementById("lo");
    const hi = document.getElementById("hi");

    if (guess === secret) {
      fb.textContent =
        "Correct! You got it in " +
        attempts +
        (attempts === 1 ? " try!" : " tries!");
      fb.style.color = "var(--color-text-success)";
      pill.classList.add("win");
      pill.textContent = guess + " ✓";
      gameOver = true;
      input.disabled = true;
      showResult(true);
    } else if (guess > secret) {
      fb.textContent = "Too high — go lower.";
      fb.style.color = "var(--color-text-danger)";
      pill.classList.add("high");
      pill.textContent = guess + " ↓";
      hi.textContent = guess - 1;
    } else {
      fb.textContent = "Too low — go higher.";
      fb.style.color = "var(--color-text-info)";
      pill.classList.add("low");
      pill.textContent = guess + " ↑";
      lo.textContent = guess + 1;
    }

    document.getElementById("history").appendChild(pill);
    input.value = "";
    input.focus();

    if (!gameOver && attempts >= MAX_ATTEMPTS) {
      fb.textContent = "Out of guesses! The number was " + secret + ".";
      fb.style.color = "var(--color-text-secondary)";
      input.disabled = true;
      gameOver = true;
      showResult(false);
    }
  }

  function showResult(won) {
    const banner = document.getElementById("result-banner");
    const text = document.getElementById("result-text");
    banner.style.display = "block";
    text.textContent = won
      ? "Nice work. The answer was " +
        secret +
        ". Want to see how the code works?"
      : "The secret was " + secret + ". Try again or explore the code below.";
  }

  document
    .getElementById("guess-input")
    .addEventListener("keydown", function (e) {
      if (e.key === "Enter") makeGuess();
    });

  resetGame();
</script>
