<!DOCTYPE html>
<html>

<head>
    <title>To-Do App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .app {
            max-width: 520px;
            margin: auto;
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: #111;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
        }

        .input-row input {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        .input-row input:focus {
            border-color: #2563eb;
        }

        .input-row select {
            padding: 10px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1.5px solid #d1d5db;
            background: white;
            cursor: pointer;
            font-size: 13px;
        }

        .filter-btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .stats {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 1rem;
        }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            transition: opacity 0.2s;
        }

        .todo-item.done {
            opacity: 0.5;
        }

        .todo-item.done .todo-text {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .todo-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2563eb;
            flex-shrink: 0;
        }

        .todo-text {
            flex: 1;
            font-size: 15px;
        }

        .priority-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .priority-high {
            background: #ef4444;
        }

        .priority-medium {
            background: #f59e0b;
        }

        .priority-low {
            background: #10b981;
        }

        .todo-delete {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
            padding: 0 4px;
            line-height: 1;
        }

        .todo-delete:hover {
            color: #ef4444;
        }

        .empty {
            text-align: center;
            color: #9ca3af;
            padding: 2rem 0;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="app">
        <h1>My Tasks</h1>

        <div class="input-row">
            <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="100" />
            <select id="prioritySelect">
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="low">Low</option>
            </select>
            <button class="btn btn-primary" id="addBtn">Add</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="done">Done</button>
            <button class="filter-btn" data-filter="high">High Priority</button>
        </div>

        <div class="stats" id="stats"></div>
        <ul class="todo-list" id="todoList"></ul>
    </div>

    <script>
        // STATE
        let tasks = [];
        let currentFilter = 'all';
        let nextId = 1;

        // LOGIC — pure functions
        function createTask(text, priority) {
            return { id: nextId++, text, priority, done: false, createdAt: new Date() };
        }

        function getFilteredTasks() {
            switch (currentFilter) {
                case 'active': return tasks.filter(t => !t.done);
                case 'done': return tasks.filter(t => t.done);
                case 'high': return tasks.filter(t => t.priority === 'high');
                default: return tasks;
            }
        }

        function getStats() {
            const total = tasks.length;
            const done = tasks.filter(t => t.done).length;
            const remaining = total - done;
            return { total, done, remaining };
        }

        // UI — render from state
        function render() {
            renderStats();
            renderTasks();
        }

        function renderStats() {
            const { total, done, remaining } = getStats();
            document.getElementById('stats').textContent =
                total === 0
                    ? 'No tasks yet. Add one above!'
                    : `${remaining} remaining · ${done} of ${total} completed`;
        }

        function renderTasks() {
            const filtered = getFilteredTasks();
            const list = document.getElementById('todoList');

            if (filtered.length === 0) {
                list.innerHTML = `<li class="empty">No tasks here.</li>`;
                return;
            }

            list.innerHTML = filtered.map(task => `
      <li class="todo-item ${task.done ? 'done' : ''}" data-id="${task.id}">
        <input type="checkbox" class="todo-checkbox" ${task.done ? 'checked' : ''} data-action="toggle" />
        <span class="priority-dot priority-${task.priority}"></span>
        <span class="todo-text">${escapeHtml(task.text)}</span>
        <button class="todo-delete" data-action="delete" title="Delete">×</button>
      </li>
    `).join('');
        }

        // Security: always escape user-generated text before putting in innerHTML
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // EVENT HANDLERS
        function addTask() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect').value;
            const text = input.value.trim();

            if (!text) {
                input.focus();
                return;
            }

            tasks.push(createTask(text, priority));
            input.value = '';
            input.focus();
            render();
        }

        // EVENT DELEGATION on the list — handles all todo interactions
        document.getElementById('todoList').addEventListener('click', (e) => {
            const item = e.target.closest('.todo-item');
            if (!item) return;

            const id = parseInt(item.dataset.id);
            const action = e.target.dataset.action;

            if (action === 'toggle') {
                tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
                render();
            }

            if (action === 'delete') {
                tasks = tasks.filter(t => t.id !== id);
                render();
            }
        });

        // Filter buttons — also event delegation
        document.querySelector('.filters').addEventListener('click', (e) => {
            if (!e.target.matches('.filter-btn')) return;
            currentFilter = e.target.dataset.filter;

            document.querySelectorAll('.filter-btn')
                .forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            render();
        });

        document.getElementById('addBtn').addEventListener('click', addTask);

        document.getElementById('taskInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Initial render
        render();
    </script>
</body>

</html>
