<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model</title>
    <style>
        .card {
            border: 1px solid #333;
            padding: 20px;
            margin: 20px;
            font-size: 18px;
        }

        .box {
            border: 1px solid #333;
            padding: 15px;
            margin: 15px;
            width: 200px;
        }
        button {
            margin-top: 10px;
            padding: 5px 10px;
        }

        img { width: 250px; display: block; margin-bottom: 10px; }



        /* Modal base */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
  opacity: 0;
}

/* Active modal */
.modal.is-open {
  display: flex;
  opacity: 1;
}

/* Modal box */
.modal-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

/* Nav */
.nav {
  display: none;
  flex-direction: column;
  margin-top: 10px;
}

.nav.is-open {
  display: flex;
}

/* Hamburger */
.hamburger {
  margin-top: 20px;
}
    </style>
</head>
<body>

<!-- Open Modal Button -->
  <button id="open-modal">Open Modal</button>

  <!-- Modal -->
  <div class="modal">
    <div class="modal-content">
      <p>Hello! I am a modal 🎉</p>
      <button id="close-modal">Close</button>
    </div>
  </div>

  <!-- Hamburger + Nav -->
  <button class="hamburger">☰</button>

  <nav class="nav">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
