  <script>
    // Your JavaScript code here



    function inspect(selector) {
      const method = selector.startsWith('#') ? 'getElementById' : 'querySelector';
      const el = method === 'getElementById'
        ? document.getElementById(selector.slice(1))
        : document.querySelector(selector);

      if (!el) { console.warn(`No element found for: ${selector}`); return; }

      console.group(`Element: ${selector}`);
      console.log('Tag:       ', el.tagName);
      console.log('ID:        ', el.id || '(none)');
      console.log('Classes:   ', [...el.classList].join(', ') || '(none)');
      console.log('Children:  ', el.children.length);
      console.log('Text:      ', el.textContent.trim().slice(0, 80));
      console.log('Parent:    ', el.parentElement?.tagName);
      console.groupEnd();
    }

    // Try it:

    inspect('h1');
